# LUKS2 encryption defaults
# Applied: cryptsetup luksFormat --type luks2 -c aes-xts-plain64 -s 512

defaults:
  cipher: aes-xts-plain64
  key_size: 512
  hash: sha512
  iter_time: 5000
  pbkdf: argon2id
  memory: 1048576  # 1GB PBKDF memory

keys:
  - type: passphrase
    slot: 0
  - type: keyfile
    slot: 1
    path: /etc/luks-keys/root.key

backup:
  - header: /root/luks-header-backup.img
  - tokens: /root/luks-tokens-backup.json
