# ZeroTier network configuration
# Network ID: join via zerotier-cli join <network-id>

network:
  id: "8056c2e21c000001"
  name: "omarchy-mesh"
  assignment: "rfc4193"  # ULA addressing

routes:
  - target: "10.147.0.0/24"
    via: "10.147.0.1"

members:
  - node: desktop
    ip: "10.147.0.10"
    capabilities: ["sync", "backup"]
  - node: laptop
    ip: "10.147.0.11"
    capabilities: ["sync"]
  - node: server
    ip: "10.147.0.20"
    capabilities: ["sync", "backup", "build"]
