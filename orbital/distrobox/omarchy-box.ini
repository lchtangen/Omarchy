# Distrobox — Omarchy-themed development container
# Usage: distrobox create --file orbital/distrobox/omarchy-box.ini

[omarchy-dev]
image = docker.io/archlinux:latest
name = omarchy-dev
description = Omarchy development environment
init = true
pull = always

additional_packages = "
  base-devel git neovim lazygit ripgrep fd fzf zoxide
  nodejs npm rust go python python-pip
  podman-docker
"

# Mount repos for access inside container
volumes = [
  "$HOME/Code:/home/$USER/Code:rslave",
  "$HOME/.config/omarchy:/home/$USER/.config/omarchy:ro"
]

# Export apps to host
exported_apps = [
  "nvim",
  "lazygit",
  "btop"
]
