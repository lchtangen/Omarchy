# Hyprland overrides for this theme
# Colors use rgba() format

general {
  col.active_border = rgba(122, 162, 247, 1.0)
  col.inactive_border = rgba(65, 72, 104, 1.0)
}

decoration {
  col.shadow = rgba(26, 27, 38, 1.0)
}

group {
  col.border_active = rgba(122, 162, 247, 1.0)
  col.border_inactive = rgba(65, 72, 104, 1.0)
}
