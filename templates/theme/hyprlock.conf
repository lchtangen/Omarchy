# Hyprlock theme overrides
background {
  path = /home/arch/.config/omarchy/themes/my-theme/backgrounds/default.jpg
  blur_passes = 3
  blur_size = 8
}

label {
  text = $TIME
  font_size = 96
  color = rgba(192, 202, 245, 1.0)
  position = 0, 80
  halign = center
  valign = center
}

input-field {
  size = 300, 50
  outline_thickness = 2
  dots_size = 0.2
  dots_spacing = 0.2
  dots_center = true
  outer_color = rgba(122, 162, 247, 1.0)
  inner_color = rgba(26, 27, 38, 1.0)
  font_color = rgba(192, 202, 245, 1.0)
  fade_on_empty = true
  placeholder_text = <i>Password...</i>
  halign = center
  valign = center
  position = 0, -40
}
