# Media voice commands
commands:
  - phrase: "play"
    action: "playerctl play"
  - phrase: "pause"
    action: "playerctl pause"
  - phrase: "next track"
    action: "playerctl next"
  - phrase: "previous track"
    action: "playerctl previous"
  - phrase: "volume up"
    action: "pactl set-sink-volume @DEFAULT_SINK@ +5%"
  - phrase: "volume down"
    action: "pactl set-sink-volume @DEFAULT_SINK@ -5%"
  - phrase: "mute"
    action: "pamixer -t"
  - phrase: "skip forward {seconds}"
    action: "playerctl position {seconds}+"
  - phrase: "skip back {seconds}"
    action: "playerctl position {seconds}-"
