# Desktop voice commands
commands:
  - phrase: "open terminal"
    action: "alacritty"
  - phrase: "open browser"
    action: "chromium"
  - phrase: "open files"
    action: "thunar"
  - phrase: "next workspace"
    action: "hyprctl dispatch workspace +1"
  - phrase: "previous workspace"
    action: "hyprctl dispatch workspace -1"
  - phrase: "lock screen"
    action: "hyprlock"
  - phrase: "screenshot region"
    action: "hyprshot -m region"
  - phrase: "screenshot screen"
    action: "hyprshot -m output"
  - phrase: "toggle floating"
    action: "hyprctl dispatch togglefloating"
  - phrase: "close window"
    action: "hyprctl dispatch killactive"
