# Whisper speech-to-text configuration
# Used by hyprwhspr / whisper.cpp

model:
  type: large-v3
  path: ~/.cache/whisper/ggml-large-v3.bin
  language: en
  translate: false

audio:
  sample_rate: 16000
  channels: 1
  device: default
  vad: true
  max_duration: 30

hotkey:
  record: "Ctrl+Shift+Space"
  toggle: "Ctrl+Shift+`"

output:
  mode: type         # type | clipboard | command
  command: "echo/commands/process.sh {text}"
