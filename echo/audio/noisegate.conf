# Noise gate configuration for voice input
# PipeWire filter chain — filters out background noise below threshold

name = "noise-gate"
nodes = {
    input  = "alsa_input.pci-0000_00_1f.3.analog-stereo"
    output = "echo_noise_gate"
}
capture.props = {
    node.name = "capture.noise-gate"
    audio.position = [ FL FR ]
}
playback.props = {
    node.name = "playback.noise-gate"
    audio.position = [ FL FR ]
    filter.graph = {
        nodes = [
            {
                type  = builtin
                name  = gate
                label = noisegate
                control = {
                    "threshold" = -40
                    "attack"    = 10
                    "release"   = 100
                    "hold"      = 50
                }
            }
        ]
    }
}
