# PipeWire voice routing — noise gate + echo cancellation
# For use with hyprwhisper / OSTT voice recognition

context.modules = [
    { name = libpipewire-module-rt
        args = { rt.prio = 0 rt.time.soft = 100000 rt.time.hard = 100000 }
        flags = [ ifexists nofail ]
    }
    { name = libpipewire-module-protocol-native }
    { name = libpipewire-module-client-node }
    { name = libpipewire-module-adapter }
]

# Noise gate for voice input
# Save as: ~/.config/pipewire/filter-chain.conf.d/noise-gate.conf
# Load: pactl load-module module-filter-chain ...

# Noise suppression using echo-cancel module
# pactl load-module module-echo-cancel
