# Maintainer: Omarchy Forge
# Optimized makepkg configuration for AMD Zen 4 / Intel Alder Lake+

COMPRESSGZIP=(pigz -c -f -n)
COMPRESSBZ2=(pbzip2 -c -f)
COMPRESSXZ=(xz -T 0 -c -z - --threads=0)
COMPRESSZST=(zstd -c -z -q --ultra -T0 -22 -)
COMPRESSLZ4=(lz4 -c -z -q --ultra -T0 -)

BUILDENV=(!distcc !color !ccache check !sign)
BUILDOPTIONS=(!docs !libtool !strip emptydirs zipman purge !debug)

# Hardware-specific optimization
# Uncomment for your CPU:
# AMD Zen 4:
# CFLAGS="-march=znver4 -mtune=znver4 -O3 -pipe -fstack-protector-strong"
# Intel Alder Lake:
# CFLAGS="-march=alderlake -mtune=alderlake -O3 -pipe -fstack-protector-strong"
# Generic (safe for all):
CFLAGS="-march=x86-64-v3 -O2 -pipe -fstack-protector-strong"
CXXFLAGS="$CFLAGS"
MAKEFLAGS="-j$(nproc)"
