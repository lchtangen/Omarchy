# Animation presets for Hyprland

# 1. Default Omarchy (smooth)
animations {
  enabled = true
  bezier = omarchy, 0.05, 0.9, 0.1, 1.05
  animation = windows, 1, 7, omarchy, popin
  animation = windowsOut, 1, 7, omarchy, popin
  animation = fade, 1, 7, omarchy
  animation = workspaces, 1, 6, omarchy, slidevert
  animation = border, 1, 10, default
}

