# App-specific window rules

windowrule = float, title:(Save As|Open File|File Operation Progress)
windowrule = float, class:(pavucontrol|blueman-manager|org.gnome.Calculator|org.gnome.Loupe)
windowrule = float, class:(org.gnome.Nautilus|Thunar) initialTitle:(Properties)
windowrule = center, class:(pavucontrol|blueman-manager)
windowrule = size 800 600, class:(pavucontrol)
windowrule = noblur, class:(firefox|Chromium) title:(Picture-in-Picture)
windowrule = noanim, class:(zenity|yad|polkit-gnome-authentication-agent-1)
windowrule = tile, class:(Alacritty|kitty|ghostty)
windowrule = fullscreen, class:(Steam) title:(Big Picture)

# Ignore maximize requests from certain apps
windowrulev2 = suppressevent maximize, class:.*
