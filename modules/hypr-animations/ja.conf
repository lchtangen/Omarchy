# JA — Smooth with borderangle loop and workspace transitions
# Ported from omarchy-config

animations {
  enabled = true

  bezier = smoothOut, 0.0, 0.0, 0.58, 1.0
  bezier = smoothIn, 0.42, 0.0, 1.0, 1.0

  animation = windows, 1, 7, smoothOut, slide
  animation = windowsOut, 1, 5, smoothIn, slide
  animation = fade, 1, 5, smoothOut
  animation = workspaces, 1, 6, smoothOut, slidevert
  animation = workspacesIn, 1, 5, smoothIn
  animation = workspacesOut, 1, 5, smoothOut
  animation = borderangle, 1, 30, linear, loop
}
