# End4 — Material Design 3 curves with popin windows
# Ported from omarchy-config

animations {
  enabled = true

  bezier = md3_decel, 0.0, 0.0, 0.0, 1.0
  bezier = md3_accel, 0.5, 0.0, 1.0, 0.5
  bezier = menu_decel, 0.0, 0.0, 0.0, 0.75

  animation = windows, 1, 6, md3_decel, popin 60%
  animation = windowsOut, 1, 4, md3_accel, slide
  animation = fade, 1, 5, md3_decel
  animation = workspaces, 1, 6, md3_decel, slidevert
  animation = specialWorkspace, 1, 6, menu_decel, slidefadevert 15%
  animation = border, 1, 8, md3_decel
}
