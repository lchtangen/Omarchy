# Diablo 1 — Aggressive snappy animations
# Ported from omarchy-config animation presets

animations {
  enabled = true

  bezier = snappyReturn, 0.05, 0.9, 0.1, 1.05
  bezier = overshot, 0.05, 0.9, 0.1, 1.1
  bezier = aggressive, 0.7, 0.0, 0.3, 1.0

  animation = windows, 1, 6, snappyReturn, popin 80%
  animation = windowsOut, 1, 4, snappyReturn, slide
  animation = fade, 1, 4, snappyReturn
  animation = workspaces, 1, 5, aggressive, slidevert
  animation = borderangle, 1, 30, linear, loop
}
