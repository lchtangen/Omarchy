# ME — Most comprehensive: MD3 curves + wind beziers, full layer/workspace support
# Ported from omarchy-config

animations {
  enabled = true

  bezier = md3_decel, 0.0, 0.0, 0.0, 1.0
  bezier = md3_accel, 0.5, 0.0, 1.0, 0.5
  bezier = menu_decel, 0.0, 0.0, 0.0, 0.75
  bezier = wind, 0.17, 0.67, 0.29, 1.0

  animation = windows, 1, 7, md3_decel, popin 60%
  animation = windowsOut, 1, 5, md3_accel, slide
  animation = fade, 1, 5, md3_decel
  animation = fadein, 1, 4, md3_decel
  animation = layers, 1, 5, md3_decel, slide
  animation = layersOut, 1, 3, md3_accel, slide
  animation = workspaces, 1, 6, wind, slidevert
  animation = specialWorkspace, 1, 6, menu_decel, slidefadevert 15%
  animation = borderangle, 1, 30, linear, loop
}
