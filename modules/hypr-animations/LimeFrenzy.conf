# LimeFrenzy — Soft overshot with popin 60% and borderangle loop
# Ported from omarchy-config

animations {
  enabled = true

  bezier = overshot, 0.05, 0.9, 0.1, 1.1

  animation = windows, 1, 7, overshot, popin 60%
  animation = windowsOut, 1, 5, overshot, slide
  animation = fade, 1, 5, overshot
  animation = workspaces, 1, 6, overshot, slidevert
  animation = borderangle, 1, 24, linear, loop
}
