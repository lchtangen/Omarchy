# Diablo 2 — Popin windows with overshot workspaces
# Ported from omarchy-config animation presets

animations {
  enabled = true

  bezier = wind, 0.17, 0.67, 0.29, 1.0
  bezier = overshot, 0.05, 0.9, 0.1, 1.1

  animation = windows, 1, 8, wind, slide
  animation = windowsOut, 1, 6, wind, slide
  animation = fade, 1, 5, wind
  animation = workspaces, 1, 7, overshot, slidevert
  animation = borderangle, 1, 25, linear, loop
}
