# Dynamic — Smooth wind bezier, simple and clean
# Ported from omarchy-config

animations {
  enabled = true

  bezier = wind, 0.17, 0.67, 0.29, 1.0

  animation = windows, 1, 7, wind, slide
  animation = windowsOut, 1, 5, wind, slide
  animation = fade, 1, 4, wind
  animation = workspaces, 1, 6, wind, slidevert
  animation = fadein, 1, 5, wind
}
