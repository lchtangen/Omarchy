# Sound FX keybindings — audio feedback for common actions
# Source from hyprland.conf: source = ~/Omarchy/modules/sound-fx/bindings.conf
# Requires: mpv (or paplay), sound files in ~/.config/omarchy/sounds/

$fx = /home/arch/Omarchy/modules/sound-fx/fx.sh
$sf = --bg

# Terminal
bind = SUPER, Return, exec, $fx terminal $sf && alacritty
bind = SUPER, T, exec, $fx terminal $sf && ghostty

# Launcher
bind = SUPER, D, exec, $fx menu $sf && fuzzel

# Workspace navigation
bind = SUPER, 1, exec, $fx click $sf && hyprctl dispatch workspace 1
bind = SUPER, 2, exec, $fx click $sf && hyprctl dispatch workspace 2
bind = SUPER, 3, exec, $fx click $sf && hyprctl dispatch workspace 3
bind = SUPER, 4, exec, $fx click $sf && hyprctl dispatch workspace 4
bind = SUPER, 5, exec, $fx click $sf && hyprctl dispatch workspace 5

# Window management
bind = SUPER, Q, exec, $fx close $sf && hyprctl dispatch killactive
bind = SUPER, F, exec, $fx toggle $sf && hyprctl dispatch fullscreen

# Lock screen
bind = SUPER, L, exec, $fx lock $sf && hyprlock
