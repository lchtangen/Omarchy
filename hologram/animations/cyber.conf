# Cyber — Neon border animations for Hyprland
animations {
  enabled = true

  # Neon pulse on active window
  bezier = neon, 0.05, 0.9, 0.1, 1.05
  animation = border, 1, 10, neon
  animation = borderangle, 1, 30, linear, loop

  # Window open — cyber slide
  animation = windows, 1, 8, neon, slide
  animation = windowsOut, 1, 8, neon, slide

  # Workspace — grid shift
  animation = workspaces, 1, 6, neon, slidevert
}

decoration {
  # Animated border color (overridden by activewindow)
  col.active_border = rgba(0, 255, 255, 1.0)
  col.inactive_border = rgba(0, 100, 100, 0.5)

  # Variable border angle for animated effect
  active_window_animation_tick = 1
}
