# Hyprlock music layout — album art + track info
# Pattern from omarchy-config hyprlock/layouts/layout2.conf

general {
    no_fade_in = true
    no_fade_out = true
    hide_cursor = true
    ignore_empty_input = true
}

background {
    path = $HOME/.cache/hyprlock/album_art_blur.jpg
    color = rgba(17, 17, 27, 1.0)
    blur_size = 0
    blur_passes = 0
}

label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    color = rgba(255, 255, 255, 1.0)
    font_size = 72
    font_family = Alfa Slab One
    position = 0, 250
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:2000] playerctl -p spotify metadata --format "{{ title }}"
    color = rgba(200, 200, 220, 1.0)
    font_size = 20
    font_family = sans-serif
    position = 0, -100
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:2000] playerctl -p spotify metadata --format "{{ artist }}"
    color = rgba(150, 150, 180, 1.0)
    font_size = 14
    font_family = sans-serif
    position = 0, -130
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.5
    dots_center = true
    outer_color = rgba(255, 255, 255, 0.2)
    inner_color = rgba(0, 0, 0, 0.5)
    font_color = rgba(255, 255, 255, 0.8)
    fade_on_empty = true
    placeholder_text = <i>Unlock...</i>
    hide_input = false
    position = 0, -60
    halign = center
    valign = center
}
